services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: audit-backend

    env_file:
      - .env

    ports:
      - "8001:8001"

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend

    container_name: audit-frontend

    env_file:
      - .env

    depends_on:
      - backend

    ports:
      - "8501:8501"

    restart: unless-stopped